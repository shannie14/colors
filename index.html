<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>colors — Abstract Liquid Backgrounds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Instrument Sans', sans-serif;
      color: #fff;
      cursor: crosshair;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── UI Overlay ── */
    .ui-overlay {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }

    .ui-overlay * { pointer-events: auto; }

    .brand {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      mix-blend-mode: difference;
    }

    .controls {
      position: fixed;
      bottom: 28px;
      left: 32px;
      z-index: 10;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 600px;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.75);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-transform: uppercase;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }

    .ctrl-btn.active {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.4);
    }

    .info {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-align: right;
      line-height: 1.7;
      mix-blend-mode: difference;
    }

    .palette-name {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      mix-blend-mode: difference;
      transition: opacity 0.5s;
    }

    .recording-indicator {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #ff4444;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .recording-indicator.active { opacity: 1; }

    .rec-dot {
      width: 8px;
      height: 8px;
      background: #ff4444;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="brand">colors</div>
  <div class="palette-name" id="paletteName">Deep Ocean</div>

  <div class="recording-indicator" id="recIndicator">
    <div class="rec-dot"></div>
    <span>REC</span>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="cyclePalette()">Palette [P]</button>
    <button class="ctrl-btn" onclick="toggleAutoSplat()">Auto Paint [A]</button>
    <button class="ctrl-btn" onclick="triggerBurst()">Burst [Space]</button>
    <button class="ctrl-btn" onclick="toggleBloom()">Bloom [B]</button>
    <button class="ctrl-btn" onclick="resetSim()">Reset [R]</button>
    <button class="ctrl-btn" onclick="captureFrame()">Screenshot [S]</button>
  </div>

  <div class="info">
    <div>Click & drag to paint</div>
    <div>Scroll to change brush size</div>
    <div>WebGL 2.0 Fluid Dynamics</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
